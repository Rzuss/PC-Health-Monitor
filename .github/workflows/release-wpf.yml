name: Release — PC Health Monitor (WPF)

# Triggers on version tags (git tag v2.0.1 && git push origin v2.0.1)
# or manually from GitHub Actions UI.
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 2.0.1)'
        required: true
        default: '2.0.1'
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build · Package · Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Resolve version ───────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
            $tag = "v$ver"
            $pre = "${{ github.event.inputs.prerelease }}" -eq "true"
          } else {
            $tag = "${{ github.ref_name }}"
            $ver = $tag.TrimStart('v')
            $pre = $ver -match '-'
          }
          "VER=$ver" | Out-File $env:GITHUB_OUTPUT -Append
          "TAG=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          "PRE=$pre"  | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Version=$ver  Tag=$tag  Pre=$pre"

      # ── 3. Setup .NET 8 ──────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 4. Restore ───────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore PCHealthMonitor-v2/PCHealthMonitor/PCHealthMonitor.csproj

      # ── 5. Publish (self-contained, single-file, win-x64) ───────────────────
      - name: Publish
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VER }}"
          dotnet publish PCHealthMonitor-v2/PCHealthMonitor/PCHealthMonitor.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:Version=$ver `
            -o publish-output
          $exe = Get-Item "publish-output\PCHealthMonitor.exe"
          Write-Host "Published: $($exe.Name)  ($([math]::Round($exe.Length/1MB,1)) MB)"

      # ── 6. Install Inno Setup ────────────────────────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          "C:\Program Files (x86)\Inno Setup 6" | Out-File $env:GITHUB_PATH -Append

      # ── 7. Build installer ───────────────────────────────────────────────────
      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VER }}"

          # Read and patch the .iss (version + publish dir must point to our output)
          $iss = Get-Content PCHealthMonitor-v2/installer.iss -Raw
          $iss = $iss -replace '#define AppVersion\s+"[^"]+"',  "#define AppVersion   `"$ver`""
          $iss = $iss -replace '#define PublishDir\s+"[^"]+"',  "#define PublishDir   `"..\publish-output`""
          Set-Content PCHealthMonitor-v2/installer.iss $iss -Encoding UTF8

          # Create output folder
          New-Item -ItemType Directory -Force -Path PCHealthMonitor-v2/dist | Out-Null

          # Build
          iscc PCHealthMonitor-v2/installer.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit code $LASTEXITCODE" }

          # The .iss OutputBaseFilename uses {#AppVersion} — rename to canonical name
          $built = Get-ChildItem "PCHealthMonitor-v2/dist/*.exe" | Select-Object -First 1
          if (-not $built) { throw "Installer exe not found in PCHealthMonitor-v2/dist/" }

          $target = "PCHealthMonitor-v2/dist/PCHealthMonitor-Setup-$ver.exe"
          if ($built.FullName -ne (Resolve-Path $target -ErrorAction SilentlyContinue)) {
            Rename-Item $built.FullName $target -ErrorAction SilentlyContinue
          }

          $final = Get-Item "PCHealthMonitor-v2/dist/PCHealthMonitor-Setup-$ver.exe"
          Write-Host "Installer ready: $($final.Name)  ($([math]::Round($final.Length/1MB,1)) MB)"

      # ── 8. Compute SHA-256 ───────────────────────────────────────────────────
      - name: Compute SHA-256
        id: sha
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $file = "PCHealthMonitor-v2/dist/PCHealthMonitor-Setup-$ver.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash
          "HASH=$hash" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "SHA-256: $hash"

      # ── 9. Generate release notes ────────────────────────────────────────────
      - name: Generate release notes
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $hash = "${{ steps.sha.outputs.HASH }}"
          @"
## PC Health Monitor v$ver

### Download & Install
1. Click **PCHealthMonitor-Setup-$ver.exe** below
2. Run the installer — setup wizard will guide you through installation
3. **No administrator rights required** — installs to your personal AppData folder
4. Launch from the Desktop shortcut or Start Menu

### System Requirements
- Windows 10 (1903+) or Windows 11
- x64 architecture
- ~80 MB disk space
- No internet connection needed — fully offline

### What's New in v$ver
- Real-time dashboard with animated CPU / RAM / Disk gauges
- Toast notification system (Success / Warning / Error / Info)
- Keyboard shortcuts: Ctrl+1–9 to switch tabs, Ctrl+R to scan, Esc to tray
- Window size & position remembered between sessions
- Integrity audit log on every launch

### Verify Binary Integrity
``````powershell
Get-FileHash "PCHealthMonitor-Setup-$ver.exe" -Algorithm SHA256
# Expected SHA-256: $hash
``````

---
*100% Offline · No Telemetry · No Admin Required · MIT License*
"@ | Out-File RELEASE_NOTES.md -Encoding UTF8

      # ── 10. Create GitHub Release with installer asset ────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.ver.outputs.TAG }}
          name:                   "PC Health Monitor v${{ steps.ver.outputs.VER }}"
          body_path:              RELEASE_NOTES.md
          draft:                  false
          prerelease:             ${{ steps.ver.outputs.PRE }}
          fail_on_unmatched_files: true
          files: |
            PCHealthMonitor-v2/dist/PCHealthMonitor-Setup-${{ steps.ver.outputs.VER }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Summary ───────────────────────────────────────────────────────────
      - name: Summary
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $hash = "${{ steps.sha.outputs.HASH }}"
          $exe  = Get-Item "PCHealthMonitor-v2/dist/PCHealthMonitor-Setup-$ver.exe"
          Write-Host "SUCCESS: PC Health Monitor v$ver released"
          Write-Host "File   : $($exe.Name)"
          Write-Host "Size   : $([math]::Round($exe.Length/1MB,1)) MB"
          Write-Host "SHA256 : $hash"
