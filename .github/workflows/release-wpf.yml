name: Release — PC Health Monitor (WPF)

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push a version tag:  git tag v2.0.0 && git push origin v2.0.0
#   • Manual run from GitHub Actions UI (workflow_dispatch)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]*'          # v2.0.0, v2.1.0-beta, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.0.0)'
        required: true
        default: '2.0.0'
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

permissions:
  contents: write    # Required to create GitHub Releases and upload assets

env:
  DOTNET_VERSION:  '8.0.x'
  PROJECT_PATH:    'PCHealthMonitor-v2/PCHealthMonitor/PCHealthMonitor.csproj'
  INSTALLER_ISS:   'PCHealthMonitor-v2/installer.iss'
  PUBLISH_DIR:     'PCHealthMonitor-v2/PCHealthMonitor/bin/Release/net8.0-windows/win-x64/publish'

jobs:
  release:
    name: Build · Sign · Package · Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Resolve version ───────────────────────────────────────────────────
      - name: Resolve version string
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
            $tag = "v$ver"
          } else {
            $tag = "${{ github.ref_name }}"
            $ver = $tag.TrimStart('v')
          }
          $isPreRelease = $ver -match '-'
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $isPreRelease = [System.Convert]::ToBoolean("${{ github.event.inputs.prerelease }}")
          }
          "VER=$ver"         | Out-File $env:GITHUB_OUTPUT -Append
          "TAG=$tag"         | Out-File $env:GITHUB_OUTPUT -Append
          "PRE=$isPreRelease"| Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver  |  Tag: $tag  |  Pre-release: $isPreRelease"

      # ── 3. Setup .NET 8 ──────────────────────────────────────────────────────
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── 4. Patch version in .csproj ──────────────────────────────────────────
      - name: Patch version in .csproj
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $path = "${{ env.PROJECT_PATH }}"
          $xml  = [xml](Get-Content $path)
          $pg   = $xml.Project.PropertyGroup | Where-Object { $_.Version }
          if ($pg) {
            $pg.Version         = $ver
            $pg.FileVersion     = "$ver.0"
            $pg.AssemblyVersion = "$ver.0"
          }
          $xml.Save((Resolve-Path $path))
          Write-Host "Patched .csproj to version $ver"

      # ── 5. Restore dependencies ──────────────────────────────────────────────
      - name: Restore NuGet packages
        shell: pwsh
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # ── 6. Publish (self-contained, single-file, win-x64) ───────────────────
      - name: dotnet publish
        shell: pwsh
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:Version=${{ steps.ver.outputs.VER }} `
            -o ${{ env.PUBLISH_DIR }}
          $exe = Get-Item "${{ env.PUBLISH_DIR }}\PCHealthMonitor.exe"
          Write-Host "Published: $($exe.Name)  ($([math]::Round($exe.Length/1MB,2)) MB)"

      # ── 7. Code signing (optional — skipped if secret not set) ───────────────
      # To enable: add CODE_SIGNING_PFX (base64-encoded .pfx) and
      # CODE_SIGNING_PASSWORD secrets in your repo Settings → Secrets.
      - name: Sign executable (optional)
        if: ${{ env.CODE_SIGNING_PFX != '' }}
        env:
          CODE_SIGNING_PFX:      ${{ secrets.CODE_SIGNING_PFX }}
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        shell: pwsh
        run: |
          # Decode PFX from base64 secret
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGNING_PFX))

          # Locate signtool.exe (ships with Windows SDK on windows-latest)
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                        -Recurse -Filter signtool.exe |
                        Sort-Object FullName -Descending | Select-Object -First 1).FullName

          & $signtool sign `
            /f $pfxPath `
            /p $env:CODE_SIGNING_PASSWORD `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /fd sha256 `
            "${{ env.PUBLISH_DIR }}\PCHealthMonitor.exe"

          Remove-Item $pfxPath -Force
          Write-Host "Executable signed successfully"

      # ── 8. Install Inno Setup 6 ──────────────────────────────────────────────
      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6"
          "$iscc" | Out-File $env:GITHUB_PATH -Append
          Write-Host "Inno Setup ready at $iscc"

      # ── 9. Patch version in installer.iss ────────────────────────────────────
      - name: Patch version in installer.iss
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VER }}"
          $iss = Get-Content ${{ env.INSTALLER_ISS }} -Raw
          $iss = $iss -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion     `"$ver`""
          Set-Content ${{ env.INSTALLER_ISS }} $iss -Encoding UTF8
          Write-Host "Patched installer.iss AppVersion → $ver"

      # ── 10. Create dist/ folder ───────────────────────────────────────────────
      - name: Create dist directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path PCHealthMonitor-v2/dist | Out-Null

      # ── 11. Build installer ───────────────────────────────────────────────────
      - name: Build installer with Inno Setup
        shell: pwsh
        working-directory: PCHealthMonitor-v2
        run: |
          iscc installer.iss
          $ver = "${{ steps.ver.outputs.VER }}"
          $exe = Get-Item "dist\PCHealthMonitor-Setup-$ver.exe"
          Write-Host "Installer: $($exe.Name)  ($([math]::Round($exe.Length/1MB,2)) MB)"

      # ── 12. Sign installer (optional) ─────────────────────────────────────────
      - name: Sign installer (optional)
        if: ${{ env.CODE_SIGNING_PFX != '' }}
        env:
          CODE_SIGNING_PFX:      ${{ secrets.CODE_SIGNING_PFX }}
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        shell: pwsh
        run: |
          $ver     = "${{ steps.ver.outputs.VER }}"
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGNING_PFX))

          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                        -Recurse -Filter signtool.exe |
                        Sort-Object FullName -Descending | Select-Object -First 1).FullName

          & $signtool sign `
            /f $pfxPath `
            /p $env:CODE_SIGNING_PASSWORD `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /fd sha256 `
            "PCHealthMonitor-v2\dist\PCHealthMonitor-Setup-$ver.exe"

          Remove-Item $pfxPath -Force
          Write-Host "Installer signed successfully"

      # ── 13. Compute SHA-256 checksum ─────────────────────────────────────────
      - name: Compute SHA-256 checksum
        id: checksum
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $file = "PCHealthMonitor-v2\dist\PCHealthMonitor-Setup-$ver.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash
          "HASH=$hash" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "SHA-256: $hash"

      # ── 14. Generate release notes ────────────────────────────────────────────
      - name: Generate release notes
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $hash = "${{ steps.checksum.outputs.HASH }}"

          $notes = @"
          ## PC Health Monitor v$ver

          ### Download & Install
          1. Download **PCHealthMonitor-Setup-$ver.exe** below
          2. Run the installer — **no administrator rights required**
          3. Launch from the Desktop shortcut or Start Menu
          4. (Optional) Enable **Start with Windows** in Settings

          ### System Requirements
          | | |
          |---|---|
          | OS | Windows 10 (1903+) or Windows 11 |
          | Architecture | x64 |
          | RAM | 100 MB |
          | Disk | 150 MB |
          | Admin rights | Not required |

          ### What's New in v$ver
          - Window size & position remembered between sessions
          - Toast notification system (Success / Warning / Error / Info)
          - Keyboard shortcuts: Ctrl+1–9 to switch tabs, Ctrl+R to scan, Esc to tray
          - Version now reads from assembly metadata (always in sync)
          - Integrity audit log on every launch

          ### Verify Binary Integrity
          ``````powershell
          Get-FileHash "PCHealthMonitor-Setup-$ver.exe" -Algorithm SHA256
          # Expected: $hash
          ``````

          ---
          *Fully offline · No telemetry · MIT License · [Source code](https://github.com/Rzuss/PC-Health-Monitor)*
          "@

          $notes | Out-File "RELEASE_NOTES.md" -Encoding UTF8

      # ── 15. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.TAG }}
          name:       "PC Health Monitor v${{ steps.ver.outputs.VER }}"
          body_path:  RELEASE_NOTES.md
          draft:      false
          prerelease: ${{ steps.ver.outputs.PRE }}
          files:      PCHealthMonitor-v2/dist/PCHealthMonitor-Setup-${{ steps.ver.outputs.VER }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 16. Job summary ───────────────────────────────────────────────────────
      - name: Job summary
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VER }}"
          $hash = "${{ steps.checksum.outputs.HASH }}"
          $exe  = Get-Item "PCHealthMonitor-v2\dist\PCHealthMonitor-Setup-$ver.exe"
          Write-Host ""
          Write-Host "✅  Release published: PC Health Monitor v$ver"
          Write-Host "    Installer : PCHealthMonitor-Setup-$ver.exe"
          Write-Host "    Size      : $([math]::Round($exe.Length/1MB,2)) MB"
          Write-Host "    SHA-256   : $hash"
          Write-Host "    URL       : https://github.com/Rzuss/PC-Health-Monitor/releases/tag/v$ver"
