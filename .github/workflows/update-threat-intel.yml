name: Update Threat Intel

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC
  workflow_dispatch:        # Manual trigger from Actions UI

jobs:
  refresh-ioc-db:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build IOC database
        run: python scripts/build_ioc_db.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet threat_intel.json && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated threat_intel.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threat_intel.json
          git commit -m "chore(intel): refresh IOC database [skip ci]"
          git push
