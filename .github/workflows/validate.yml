name: PowerShell Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Analyze PC-Health-Monitor.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer .\PC-Health-Monitor.ps1 -Severity Error,Warning
          if ($results) {
              $results | Format-Table -AutoSize
              $errors = $results | Where-Object { $_.Severity -eq 'Error' }
              if ($errors) {
                  Write-Error "PSScriptAnalyzer found $($errors.Count) Error-level finding(s). Build failed."
                  exit 1
              }
              Write-Warning "PSScriptAnalyzer found $($results.Count) Warning(s)."
          } else {
              Write-Host "PSScriptAnalyzer: no issues found." -ForegroundColor Green
          }
